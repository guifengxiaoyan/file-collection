{% extends "base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<div class="container form-container">
    <h2><i class="fas fa-key"></i> 修改密码</h2>
    <form method="POST" class="theme-form">
        <div class="form-group">
            <label><i class="fas fa-lock"></i> 原密码</label>
            <input type="password" name="old_password" required placeholder="输入原密码">
        </div>
        <div class="form-group">
            <label><i class="fas fa-key"></i> 新密码</label>
            <input type="password" name="new_password" required placeholder="输入新密码（至少6位）">
        </div>
        <div class="form-group">
            <label><i class="fas fa-key"></i> 确认新密码</label>
            <input type="password" name="confirm_password" required placeholder="再次输入新密码">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 保存修改
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 返回
            </a>
        </div>
    </form>
</div>
{% endblock %}
