{% extends "base.html" %}

{% block title %}编辑收集主题{% endblock %}

{% block content %}
<div class="container form-container">
    <h2><i class="fas fa-edit"></i> 编辑收集主题</h2>
    <form method="POST" enctype="multipart/form-data" class="theme-form">
        <div class="form-group">
            <label><i class="fas fa-folder"></i> 主题名称 *</label>
            <input type="text" name="title" value="{{ theme.title }}" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-file-alt"></i> 描述说明</label>
            <textarea name="description" rows="3">{{ theme.description or '' }}</textarea>
        </div>
        <div class="form-group">
            <label><i class="fas fa-bullhorn"></i> 主题公告</label>
            <textarea name="announcement" rows="4" placeholder="输入主题公告内容">{{ theme.announcement or '' }}</textarea>
        </div>
        <div class="form-group">
            <label><i class="fas fa-calendar-alt"></i> 截止时间 *</label>
            <input type="datetime-local" name="deadline" value="{{ theme.deadline.strftime('%Y-%m-%dT%H:%M') }}" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-user"></i> 收集人</label>
            <input type="text" name="collector_name" value="{{ theme.collector_name or '' }}">
        </div>
        <div class="form-group">
            <label><i class="fas fa-paperclip"></i> 添加新附件</label>
            <input type="file" name="attachments" id="attachment-input" multiple style="display:none;" onchange="updateFileList()">
            <label for="attachment-input" class="btn btn-secondary" style="cursor:pointer;">
                <i class="fas fa-upload"></i> 选择文件
            </label>
            <div id="selected-files-list" style="margin-top: 10px;"></div>
            <div id="file-list-hint" style="margin-top: 10px; color: var(--text-secondary);">
                <i class="fas fa-info-circle"></i> 支持多个文件，可选择 pdf, doc, docx, xls, xlsx, zip, rar, txt, png, jpg 等格式
            </div>
            {% if theme.attachments %}
            <div style="margin-top: 15px;">
                <label><i class="fas fa-file-alt"></i> 当前附件：</label>
                <div class="attachment-list" style="margin-top: 8px;">
                    {% for att in theme.attachments %}
                    <span class="existing-attachment">
                        <i class="fas fa-file"></i> {{ att.original_name }}
                    </span>
                    {% endfor %}
                </div>
            </div>
            {% endif %}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 保存修改
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 取消
            </a>
        </div>
    </form>
</div>

<script>
var selectedFiles = [];

function updateFileList() {
    var input = document.getElementById('attachment-input');
    var fileListDiv = document.getElementById('selected-files-list');
    var hintDiv = document.getElementById('file-list-hint');
    
    for (var i = 0; i < input.files.length; i++) {
        selectedFiles.push(input.files[i]);
    }
    
    if (selectedFiles.length > 0) {
        var html = '<i class="fas fa-files"></i> 已选择 ' + selectedFiles.length + ' 个文件：<br>';
        for (var i = 0; i < selectedFiles.length; i++) {
            html += '<span style="display:inline-flex; align-items:center; background:var(--bg-dark); padding:4px 10px; margin:4px 4px 4px 0; border-radius:4px; font-size:13px;"><i class="fas fa-file"></i> ' + selectedFiles[i].name + ' <button type="button" onclick="removeFile(' + i + ')" style="background:none; border:none; color:var(--danger); cursor:pointer; margin-left:6px; padding:0;"><i class="fas fa-times"></i></button></span>';
        }
        fileListDiv.innerHTML = html;
        hintDiv.style.display = 'none';
    } else {
        fileListDiv.innerHTML = '';
        hintDiv.style.display = 'block';
    }
    
    updateFileInput();
}

function removeFile(index) {
    selectedFiles.splice(index, 1);
    updateFileList();
}

function updateFileInput() {
    var input = document.getElementById('attachment-input');
    var dataTransfer = new DataTransfer();
    for (var i = 0; i < selectedFiles.length; i++) {
        dataTransfer.items.add(selectedFiles[i]);
    }
    input.files = dataTransfer.files;
}
</script>

<style>
.existing-attachment {
    display: inline-block;
    background: var(--bg-dark);
    padding: 6px 12px;
    margin: 4px 4px 4px 0;
    border-radius: 4px;
    font-size: 13px;
    border: 1px solid var(--border-color);
}
</style>
{% endblock %}
