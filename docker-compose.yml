services:
  app:
    build: .
    container_name: file-collection
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/instance
    environment:
      - SECRET_KEY=your-secret-key-change-in-production
      - FLASK_ENV=production
      - TZ=Asia/Shanghai  # 添加北京时间时区
    restart: unless-stopped
